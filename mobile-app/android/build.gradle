// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

ext {
    storeFile = project.hasProperty("STORE_FILE") ? project.STORE_FILE : null
    storePassword = project.hasProperty("STORE_PASSWORD") ? project.STORE_PASSWORD : null
    keyAlias = project.hasProperty("KEY_ALIAS") ? project.KEY_ALIAS : null
    keyPassword = project.hasProperty("KEY_PASSWORD") ? project.KEY_PASSWORD : null
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
