databases:
  - name: e3-postgres
    databaseName: e3_consultora
    plan: free

services:
  - type: web
    name: e3-api
    runtime: python
    plan: free
    autoDeploy: true
    branch: api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: e3-postgres
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: WEBHOOK_SECRET
        generateValue: true
