{% extends "base.html" %}

{% block login_content %}
<div class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md border-t-4 border-emerald-500">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-slate-900 rounded-xl flex items-center justify-center mx-auto mb-4">
                <span class="text-2xl font-bold text-amber-400 drop-shadow-md">E³</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">E³ Admin</h1>
            <p class="text-slate-500 mt-2">Panel de Administración</p>
        </div>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Usuario</label>
                <input type="text" name="username" required class="w-full px-4 py-3 border-2 border-slate-400 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition" placeholder="Ingresa tu usuario">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-3 border-2 border-slate-400 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition" placeholder="Ingresa tu contraseña">
            </div>
            
            <button type="submit" class="w-full bg-amber-500 text-slate-900 py-3 rounded-lg font-semibold hover:bg-amber-400 hover:shadow-lg transition-all duration-200 border-2 border-amber-600">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-xs text-slate-400">Sistema de administración</p>
        </div>
    </div>
</div>
{% endblock %}
