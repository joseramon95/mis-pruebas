{% extends "base.html" %}

{% block login_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-navy-900 to-navy-800">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-navy-800">E³ Admin</h1>
            <p class="text-gray-500 mt-2">Panel de Administración</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                <input type="text" name="username" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-gold-500 text-navy-900 py-3 rounded-lg font-bold hover:bg-gold-600 transition">
                Iniciar Sesión
            </button>
        </form>
        
    </div>
</div>
{% endblock %}
