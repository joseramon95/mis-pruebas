{% extends "base.html" %}

{% block title %}Editar {{ componente.nombre }} - E³ Admin{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="{{ url_for('crud.listar_componentes') }}" class="text-slate-500 hover:text-emerald-600 mb-2 inline-flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver a Componentes
    </a>
    <h1 class="text-3xl font-bold text-slate-800">Editar: {{ componente.nombre }}</h1>
</div>

<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-3xl">
    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Título</label>
            <input type="text" name="titulo" value="{{ componente.titulo or '' }}" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Subtítulo</label>
            <input type="text" name="subtitulo" value="{{ componente.subtitulo or '' }}" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Contenido Principal</label>
            <textarea name="contenido" rows="5" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition resize-none">{{ componente.contenido or '' }}</textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Link/Botón</label>
            <input type="text" name="link" value="{{ componente.link or '' }}" placeholder="https://..." class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Datos Extra (JSON)</label>
            <textarea name="extra_data" rows="3" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition resize-none font-mono text-sm">{{ componente.extra_data or '' }}</textarea>
            <p class="text-xs text-slate-500 mt-1">Datos adicionales en formato JSON (opcional)</p>
        </div>
        
        <div class="flex gap-3 pt-3">
            <button type="submit" class="flex-1 bg-amber-500 text-slate-900 py-2.5 rounded-lg font-medium hover:bg-amber-400 hover:shadow-md transition border-2 border-amber-600">
                Guardar Cambios
            </button>
            <a href="{{ url_for('crud.listar_componentes') }}" class="px-5 py-2.5 border border-slate-300 text-slate-600 rounded-lg font-medium hover:bg-slate-50 transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
