{% extends "base.html" %}

{% block title %}Editar {{ componente.nombre }} - E³ Admin{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="{{ url_for('listar_componentes') }}" class="text-gray-500 hover:text-navy-800 mb-2 inline-flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver a Componentes
    </a>
    <h1 class="text-3xl font-bold text-navy-800">Editar: {{ componente.nombre }}</h1>
</div>

<div class="bg-white rounded-xl shadow-lg p-8 max-w-3xl">
    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Título</label>
            <input type="text" name="titulo" value="{{ componente.titulo or '' }}" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Subtítulo</label>
            <input type="text" name="subtitulo" value="{{ componente.subtitulo or '' }}" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Contenido Principal</label>
            <textarea name="contenido" rows="5" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition resize-none">{{ componente.contenido or '' }}</textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Link/Botón</label>
            <input type="text" name="link" value="{{ componente.link or '' }}" placeholder="https://..." class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Datos Extra (JSON)</label>
            <textarea name="extra_data" rows="3" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-gold-500 focus:outline-none transition resize-none font-mono text-sm">{{ componente.extra_data or '' }}</textarea>
            <p class="text-xs text-gray-500 mt-1">Datos adicionales en formato JSON (opcional)</p>
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" class="flex-1 bg-gold-500 text-navy-900 py-3 rounded-lg font-bold hover:bg-gold-600 transition">
                Guardar Cambios
            </button>
            <a href="{{ url_for('listar_componentes') }}" class="px-6 py-3 border-2 border-gray-300 text-gray-600 rounded-lg font-medium hover:bg-gray-50 transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
