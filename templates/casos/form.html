{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <a href="/casos" class="text-gray-600 hover:text-gray-900">
        ← Volver a Casos de Éxito
    </a>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold mb-6">{{ 'Editar' if caso else 'Nuevo' }} Caso de Éxito</h2>

    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Título *</label>
                <input type="text" name="titulo" value="{{ caso.titulo or '' }}" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Slug *</label>
                <input type="text" name="slug" value="{{ caso.slug or '' }}" required placeholder="ejemplo-caso-exito"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-500 mt-1">URL amigable (sin espacios, usar guiones)</p>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
            <textarea name="descripcion" rows="2" 
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ caso.descripcion or '' }}</textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">URL de Imagen</label>
            <input type="url" name="imagen" value="{{ caso.imagen or '' }}" placeholder="https://..."
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Contenido (Descripción extendida)</label>
            <textarea name="contenido" rows="5" 
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ caso.contenido or '' }}</textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Resultados (uno por línea)</label>
            <textarea name="resultados" rows="4" placeholder="Resultado 1&#10;Resultado 2&#10;Resultado 3"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{% if caso and caso.resultados %}{% for r in resultados %}{{ r }}{% if not loop.last %}

{% endif %}{% endfor %}{% endif %}</textarea>
            <p class="text-xs text-gray-500 mt-1">Ingresa cada resultado en una línea separada</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Autor del Testimonio</label>
                <input type="text" name="autor_testimonio" value="{{ caso.autor_testimonio or '' }}" placeholder="Nombre del cliente"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Cargo del Testimonio</label>
                <input type="text" name="cargo_testimonio" value="{{ caso.cargo_testimonio or '' }}" placeholder="CEO, Director, etc."
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Orden</label>
                <input type="number" name="orden" value="{{ caso.orden or 0 }}" min="0"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Texto del Testimonio</label>
            <textarea name="texto_testimonio" rows="3" placeholder="Cita o testimonio del cliente..."
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ caso.texto_testimonio or '' }}</textarea>
        </div>

        <div class="flex justify-end gap-4">
            <a href="/casos" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                Cancelar
            </a>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                Guardar
            </button>
        </div>
    </form>
</div>
{% endblock %}
