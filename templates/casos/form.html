{% extends "base.html" %}

{% block title %}{{ 'Editar' if caso else 'Nuevo' }} Caso - E³ Admin{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="/casos" class="text-slate-500 hover:text-emerald-600 mb-2 inline-flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver a Casos de Éxito
    </a>
    <h1 class="text-3xl font-bold text-slate-800">{{ 'Editar' if caso else 'Nuevo' }} Caso de Éxito</h1>
</div>

<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-3xl">
    <form method="POST" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Título *</label>
                <input type="text" name="titulo" value="{{ caso.titulo or '' }}" required 
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Slug *</label>
                <input type="text" name="slug" value="{{ caso.slug or '' }}" required placeholder="ejemplo-caso"
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
                <p class="text-xs text-slate-500 mt-1">URL amigable (sin espacios)</p>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Descripción</label>
            <textarea name="descripcion" rows="2" 
                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">{{ caso.descripcion or '' }}</textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">URL de Imagen</label>
            <input type="url" name="imagen" value="{{ caso.imagen or '' }}" placeholder="https://..."
                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Contenido</label>
            <textarea name="contenido" rows="4" 
                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">{{ caso.contenido or '' }}</textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Resultados (uno por línea)</label>
            <textarea name="resultados" rows="3" placeholder="Resultado 1&#10;Resultado 2&#10;Resultado 3"
                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">{% if caso and caso.resultados %}{% for r in resultados %}{{ r }}{% if not loop.last %}

{% endif %}{% endfor %}{% endif %}</textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Autor del Testimonio</label>
                <input type="text" name="autor_testimonio" value="{{ caso.autor_testimonio or '' }}" placeholder="Nombre"
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Cargo</label>
                <input type="text" name="cargo_testimonio" value="{{ caso.cargo_testimonio or '' }}" placeholder="CEO, Director..."
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Orden</label>
                <input type="number" name="orden" value="{{ caso.orden or 0 }}" min="0"
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Testimonio</label>
            <textarea name="texto_testimonio" rows="3" placeholder="Cita del cliente..."
                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none">{{ caso.texto_testimonio or '' }}</textarea>
        </div>

        <div class="flex gap-3 pt-3">
            <button type="submit" class="flex-1 bg-amber-500 text-slate-900 py-2.5 rounded-lg font-medium hover:bg-amber-400 hover:shadow-md transition border-2 border-amber-600">
                {{ 'Guardar Cambios' if caso else 'Crear Caso' }}
            </button>
            <a href="/casos" class="px-5 py-2.5 border border-slate-300 text-slate-600 rounded-lg font-medium hover:bg-slate-50 transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
